name: Build

on:
  push:
    branches-ignore:
      - 'dev/**'
    tags-ignore:
      - '**'
  pull_request:

env:
  BUILD_CONFIGURATION: Release
  PLATFORM_CONFIGURATION: x64

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Add 'msbuild' to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build (msbuild)
        working-directory: ${{ github.workspace }}
        run: msbuild /m /p:Configuration=${{ env.BUILD_CONFIGURATION }} /p:Platform=${{ env.PLATFORM_CONFIGURATION }} project

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: "asuna-gmod.dll"
          path: "build/release/asuna-gmod.dll"
          retention-days: 3